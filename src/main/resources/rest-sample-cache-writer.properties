# PostgreSQL read source. This process reads DB and writes Redis; it does not expose REST or Dubbo.
sample.db.jdbc-url=jdbc:postgresql://127.0.0.1:15432/reactor_sample
sample.db.username=reactor
sample.db.password=reactor
sample.db.driver-class-name=org.postgresql.Driver
sample.db.pool-name=rest-sample-cache-writer-db
sample.db.postgresql.application-name=rest-sample-cache-writer
sample.db.maximum-pool-size=2
sample.db.minimum-idle=0
sample.db.connection-timeout-ms=3000
sample.db.validation-timeout-ms=1000
sample.db.idle-timeout-ms=30000
sample.db.max-lifetime-ms=300000
sample.db.leak-detection-threshold-ms=0
sample.db.initialization-fail-timeout-ms=-1
sample.db.auto-commit=true
sample.db.read-only=true
sample.db.register-mbeans=false

# Demo-only schema bootstrap. In production, use Flyway/Liquibase or platform-owned migration.
sample.db.schema-init=true

# Cache materialization job. Multiple replicas are safe: only the lock owner publishes a new version.
sample.writer.run-once=false
sample.writer.initial-delay-ms=1000
sample.writer.interval-ms=60000
sample.writer.lock-name=crm.customer.refresh
sample.writer.lock-ttl-ms=300000
sample.writer.scheduler-threads=2
sample.writer.cache-ttl-ms=600000
sample.writer.cache-ttl-safety-margin-ms=30000
sample.writer.namespace=crm.customer
sample.writer.detail.interval-ms=300000
sample.writer.detail.lock-name=crm.customer.detail.refresh
sample.writer.detail.lock-ttl-ms=300000
sample.writer.detail.namespace=crm.customer.detail
sample.writer.detail.cache-ttl-ms=1800000
sample.writer.segment.interval-ms=120000
sample.writer.segment.lock-name=crm.customer.segment.refresh
sample.writer.segment.lock-ttl-ms=120000
sample.writer.segment.namespace=crm.customer.segment
sample.writer.segment.cache-ttl-ms=300000
sample.writer.status.interval-ms=120000
sample.writer.status.lock-name=crm.customer.status.refresh
sample.writer.status.lock-ttl-ms=120000
sample.writer.status.namespace=crm.customer.status
sample.writer.status.cache-ttl-ms=300000
sample.writer.campaign.interval-ms=30000
sample.writer.campaign.lock-name=crm.customer.campaign.refresh
sample.writer.campaign.lock-ttl-ms=120000
sample.writer.campaign.namespace=crm.customer.campaign
sample.writer.campaign.cache-ttl-ms=120000
sample.writer.meta.interval-ms=60000
sample.writer.meta.lock-name=crm.customer.meta.refresh
sample.writer.meta.lock-ttl-ms=120000
sample.writer.meta.namespace=crm.customer.meta
sample.writer.meta.cache-ttl-ms=300000
sample.writer.snapshot-batch-size=256
sample.writer.page-size=500
sample.writer.segment-index-limit=100
sample.writer.status-index-limit=100
sample.writer.campaign-candidate-limit=100

# Native Redis client. Read side is tiny here; write side gets two connections for batch SET pipeline.
# Local default is standalone. Use cluster or sentinel in production.
reactor.cache.redis.topology=standalone
reactor.cache.redis.nodes=
reactor.cache.redis.sentinel.master-name=
reactor.cache.redis.sentinel.master-check-ms=1000
reactor.cache.redis.cluster.max-redirects=5
reactor.cache.redis.topology-refresh-ms=30000
reactor.cache.redis.host=127.0.0.1
reactor.cache.redis.port=6379
reactor.cache.redis.username=
reactor.cache.redis.password=
reactor.cache.redis.database=0
reactor.cache.redis.connect-timeout-ms=500
reactor.cache.redis.read-timeout-ms=500
reactor.cache.redis.write-timeout-ms=1000
reactor.cache.redis.read-connections=1
reactor.cache.redis.write-connections=2
reactor.cache.redis.max-read-inflight=16
reactor.cache.redis.max-write-inflight=4
reactor.cache.redis.max-response-bytes=1048576
