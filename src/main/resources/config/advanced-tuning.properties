# Advanced tuning overlay. Do not enable blindly. Measure DB wait, Redis latency, p99 and RSS together.

# Projection-specific namespaces and locks. Defaults are derived from sample.writer.namespace.
sample.writer.detail.namespace=crm.customer.detail
sample.writer.detail.lock-name=crm.customer.detail.refresh
sample.writer.detail.lock-ttl-ms=300000
sample.writer.segment.namespace=crm.customer.segment
sample.writer.segment.lock-name=crm.customer.segment.refresh
sample.writer.segment.lock-ttl-ms=120000
sample.writer.status.namespace=crm.customer.status
sample.writer.status.lock-name=crm.customer.status.refresh
sample.writer.status.lock-ttl-ms=120000
sample.writer.campaign.namespace=crm.customer.campaign
sample.writer.campaign.lock-name=crm.customer.campaign.refresh
sample.writer.campaign.lock-ttl-ms=120000
sample.writer.meta.namespace=crm.customer.meta
sample.writer.meta.lock-name=crm.customer.meta.refresh
sample.writer.meta.lock-ttl-ms=120000

# Larger writer capacity for bulk refresh windows.
sample.writer.scheduler-threads=3
sample.writer.snapshot-batch-size=512
sample.writer.page-size=1000
sample.writer.segment-index-limit=250
sample.writer.status-index-limit=250
sample.writer.campaign-candidate-limit=250

# Larger Redis write pipeline. Use only if Redis CPU/network is healthy.
reactor.cache.redis.write-connections=4
reactor.cache.redis.access-mode=write-only
reactor.cache.redis.max-write-inflight=16
reactor.cache.redis.topology-refresh-ms=30000
